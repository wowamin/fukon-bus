    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樂活長照無障礙預約諮詢</title>
    <!-- 只使用 Supabase client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="form-container">
    <div class="header">樂活長照無障礙預約諮詢</div>
    <hr>
    <div class="field-label">姓名 *</div>
    <input type="text" id="name" required placeholder="請輸入姓名" maxlength="20">

    <div class="field-label">電話 *</div>
    <input type="tel" id="phone" required placeholder="請輸入手機號碼" pattern="[0-9]{10}" maxlength="10">

    <div class="field-label">Email</div>
    <input type="email" id="email" placeholder="可選填，方便聯繫">
    
    <div class="question-title">個案 (長輩) 居住地點位於* ?</div>

    <div class="field-label">【 縣 市 】*</div>
    <select id="city" required>
        <option value="">請選擇</option>
        <option value="台南市">台南市</option>
    </select>

    <div class="field-label">【 鄉 鎮 市 區 】*</div>
    <select id="district" required>
        <option value="">請選擇</option>
        <option value="北區">北區</option>
        <option value="南區">南區</option>
        <option value="東區">東區</option>
        <option value="中西區">中西區</option>
        <option value="安平區">安平區</option>
        <!-- 其他鄉鎮可自行補充 -->
    </select>

    <div class="field-label">【 路 街 巷 弄 】*</div>
    <textarea id="address" required placeholder="限 50 字內" maxlength="50"></textarea>

    <div class="field-label">其他地點(請補充說明) :</div>
    <textarea id="other_info" placeholder="限 50 字內" maxlength="50"></textarea>

    <br>
    <!-- 改成呼叫 submitForm() -->
    <button class="submit-btn" onclick="submitForm()">送出預約</button>

    <div id="message"></div>
</div>

    // 初始化 client（用獨立變數名，避免與 global supabase 衝突）
    const sbClient = supabase.createClient(MY_SUPABASE_URL, MY_SUPABASE_ANON_KEY);

    // 確認初始化成功（debug 用，可之後刪）

async function submitForm() {
    const messageDiv = document.getElementById('message');
    messageDiv.innerHTML = '<span style="color:orange">處理中，請稍候...</span>';

    const formData = {
        name: document.getElementById('name').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        email: document.getElementById('email').value.trim(),
        city: document.getElementById('city').value,

        address: document.getElementById('address').value.trim(),
        other_info: document.getElementById('other_info').value.trim()
    };
        try {
    const { data, error } = await sbClient
        .from('bus_inquiries')
        .insert([formData])
        .select(); // 必須有 select 才能拿回 id

    if (error) {
        // 如果還有錯誤，這裡會印出具體原因 (例如：某個欄位不存在)
        console.error('Supabase 插入失敗：', error.message, error.details);
        throw error;
    }

    if (data && data.length > 0) {
        const shortId = data[0].id.toString().slice(-5);
        messageDiv.innerHTML = `<span style="color: green; font-weight: bold;">預約成功！編號：${shortId}</span>`;
        // 清空表單
        document.querySelectorAll('input, select, textarea').forEach(el => el.value = '');
    }
} catch (err) {

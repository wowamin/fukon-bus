<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樂活長照無障礙預約諮詢</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="form-container">
    <div class="header">樂活長照無障礙預約諮詢</div>
    <hr>

    <form id="bookingForm">
        <div class="field-label">姓名 *</div>
        <input type="text" id="name" name="name" required placeholder="請輸入姓名" maxlength="20">

        <div class="field-label">電話 *</div>
        <input type="tel" id="phone" name="phone" required placeholder="請輸入手機號碼" pattern="[0-9]{10}" maxlength="10">

        <div class="field-label">Email</div>
        <input type="email" id="email" name="email" placeholder="可選填，方便聯繫">

        <div class="question-title">個案 (長輩) 居住地點位於 *</div>

        <div class="field-label">【 縣 市 】*</div>
        <select id="city" name="city" required>
            <option value="">請選擇</option>
            <option value="台南市">台南市</option>
        </select>

        <div class="field-label">【 鄉 鎮 市 區 】*</div>
        <select id="district" name="district" required>
            <option value="">請選擇</option>
            <option value="北區">北區</option>
            <option value="南區">南區</option>
            <option value="東區">東區</option>
            <option value="中西區">中西區</option>
            <option value="安平區">安平區</option>
        </select>

        <div class="field-label">【 路 街 巷 弄 】*</div>
        <textarea id="address" name="address" required placeholder="限 50 字內" maxlength="50"></textarea>

        <div class="field-label">其他地點 (請補充說明)：</div>
        <textarea id="other_info" name="other_info" placeholder="限 50 字內" maxlength="50"></textarea>

        <br>
        <button type="submit" id="submitBtn" class="submit-btn">送出預約</button>

        <div id="message"></div>
    </form>
</div>

<script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz-NpmDAvnKM5Jy5uv36v4MN2tvPJOFZWa6Y3U6GrxRVBjuJuXD5goqe38G7Ar6qw2M/exec';

    document.getElementById('bookingForm').addEventListener('submit', submitForm);

    async function submitForm(e) {
        e.preventDefault();

        const form = document.getElementById('bookingForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        if (!form.checkValidity()) {
            form.reportValidity();
            return;
        }

        const formData = {
            name: document.getElementById('name').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            email: document.getElementById('email').value.trim(),
            city: document.getElementById('city').value,
            district: document.getElementById('district').value,
            address: document.getElementById('address').value.trim(),
            other_info: document.getElementById('other_info').value.trim()
        };

        submitBtn.disabled = true;
        messageDiv.innerHTML = '<span style="color:orange">處理中，請稍候...</span>';

        try {
            await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
                },
                body: new URLSearchParams(formData).toString(),
                mode: 'no-cors'
            });

            messageDiv.innerHTML = '<span style="color:green;font-weight:bold;">預約成功！我們會盡快與您聯繫。</span>';
            form.reset();
        } catch (err) {
            messageDiv.innerHTML = `<span style="color:red">送出失敗：${err.message || '請檢查網路連線後再試一次'}</span>`;
        } finally {
            submitBtn.disabled = false;
        }
    }
</script>

</body>
</html>
